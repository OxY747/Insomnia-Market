<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOMNIA MARKET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0a0a0a;
}

/* HERO */
.hero{
    height:100vh;
    background:url('banner.jpg') center center;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-shadow:0 0 20px black;
}

/* LOGO */
.logo{
    font-size:100px;
    letter-spacing:10px;
    text-transform:uppercase;
    animation: fadeIn 2s ease-out, glow 2s infinite alternate, float 4s ease-in-out infinite;
}

/* ANIMACJE */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff, 0 0 20px #ff00ff;
    }
    to{
        text-shadow:0 0 20px #fff, 0 0 40px #ff00ff, 0 0 60px #8a2be2;
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(10px);
    }
}

h3{
    font-size:30px;
    margin-top:10px;
}

/* SHOP */
.shop{
    padding:80px 20px;
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

.item{
    background:linear-gradient(145deg,#1c1c1c,#111);
    padding:25px;
    width:260px;
    border-radius:15px;
    color:white;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.05);
}

.item:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,0,255,0.25);
}

.item h2{
    margin-bottom:10px;
}

.item p{
    opacity:0.8;
    margin-bottom:10px;
}

.item span{
    color:#ff00ff;
    font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">
    <h1 class="logo">INSOMNIA</h1>
    <h3>ARK: Survival Ascended</h3>
</section>

<section class="shop">

  <div class="item">
    <h2>Starter Pack</h2>
    <p>Podstawowy zestaw na start</p>
    <span>10 PLN</span>
  </div>

  <div class="item">
    <h2>VIP Kit</h2>
    <p>Lepszy ekwipunek i bonusy</p>
    <span>25 PLN</span>
  </div>

  <div class="item">
    <h2>Alpha Mount</h2>
    <p>Rzadki dinozaur</p>
    <span>50 PLN</span>
  </div>

</section>

</body>
</html>
</body>
</html>
