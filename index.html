<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOMNIA MARKET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0a0a0a;
}

/* NAVBAR - PEWNY FIX */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.85);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:9999;
}

nav .logoSmall{
    color:#fff;
    font-weight:bold;
    letter-spacing:3px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

nav ul li a:hover{
    color:#ff00ff;
}

/* HERO */
.hero{
    height:100vh;
    background:url('banner.jpg') center center;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-shadow:0 0 20px black;
    padding-top:80px;
}

.logo{
    font-size:100px;
    letter-spacing:10px;
    text-transform:uppercase;
    animation: fadeIn 2s ease-out, glow 2s infinite alternate, float 4s ease-in-out infinite;
}

h3{
    font-size:30px;
    margin-top:10px;
}

/* ANIMACJE */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff, 0 0 20px #ff00ff;
    }
    to{
        text-shadow:0 0 20px #fff, 0 0 40px #ff00ff, 0 0 60px #8a2be2;
    }
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(10px);}
}

/* SHOP */
.shop{
    padding:80px 20px;
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

.item{
    background:#1c1c1c;
    padding:25px;
    width:260px;
    border-radius:15px;
    color:white;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.05);
}

.item:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,0,255,0.25);
}
</style>
</head>

<body>

<nav>
    <div class="logoSmall">INSOMNIA</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#shop">Shop</a></li>
        <li><a href="#">Discord</a></li>
    </ul>
</nav>

<section class="hero">
    <h1 class="logo">INSOMNIA</h1>
    <h3>ARK: Survival Ascended</h3>
</section>

<section class="shop" id="shop">

  <div class="item">
    <h2>Starter Pack</h2>
    <p>Podstawowy zestaw na start</p>
    <span>10 PLN</span>
  </div>

  <div class="item">
    <h2>VIP Kit</h2>
    <p>Lepszy ekwipunek i bonusy</p>
    <span>25 PLN</span>
  </div>

</section>

</body>
</html>
