<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOMNIA MARKET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.85);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:9999;
}

nav .logoSmall{
    font-weight:bold;
    letter-spacing:3px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

nav ul li a:hover{
    color:#ff00ff;
}

/* HERO */
.hero{
    height:100vh;
    background:url('banner.jpg') center center;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-shadow:0 0 20px black;
    padding-top:80px;
}

.logo{
    font-size:100px;
    letter-spacing:10px;
    animation: glow 2s infinite alternate, float 4s infinite ease-in-out;
}

h3{
    font-size:30px;
    margin-top:10px;
}

/* ANIMACJE */
@keyframes glow{
    from{
        text-shadow:0 0 10px #fff, 0 0 20px #ff00ff;
    }
    to{
        text-shadow:0 0 20px #fff, 0 0 40px #ff00ff;
    }
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(10px);}
}

/* SHOP */
.shop{
    padding:80px 10%;
}

/* CATEGORY */
.category{
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.02);
}

.category-header{
    padding:15px 20px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:20px;
}

.category-header:hover{
    background:rgba(255,0,255,0.1);
}

.arrow{
    transition:0.3s;
}

/* SLIDE */
.items{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
    padding:0 20px;
}

.category.open .items{
    max-height:600px;
    padding:10px 20px 20px 20px;
}

/* ITEM (ARK STYLE) */
.item-adv{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 20px;
    margin:10px 0;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

.item-adv:hover{
    background:rgba(255,0,255,0.08);
    transform:translateX(6px);
}

.item-adv img{
    width:50px;
    height:50px;
    margin-right:15px;
}

.item-adv .info{
    flex:1;
    display:flex;
    flex-direction:column;
}

.item-adv h3{
    font-size:16px;
    margin-bottom:3px;
}

.item-adv p{
    font-size:12px;
    opacity:0.7;
}

.price{
    color:#ff00ff;
    font-weight:bold;
}
</style>
</head>

<body>

<nav>
    <div class="logoSmall">INSOMNIA</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#shop">Shop</a></li>
    </ul>
</nav>

<section class="hero">
    <h1 class="logo">INSOMNIA</h1>
    <h3>ARK: Survival Ascended</h3>
</section>

<section class="shop" id="shop">

<!-- VIP -->
<div class="category">
    <div class="category-header" onclick="toggle(this)">
        VIP <span class="arrow">▼</span>
    </div>
    <div class="items">

        <div class="item-adv">
            <img src="https://ark-unity.com/images/icons/CementPaste_Icon.webp">
            <div class="info">
                <h3>Cementing Paste</h3>
                <p>Crafting Resource</p>
            </div>
            <div class="price">30K ADV</div>
        </div>

    </div>
</div>

<!-- DINOS -->
<div class="category">
    <div class="category-header" onclick="toggle(this)">
        DINOS <span class="arrow">▼</span>
    </div>
    <div class="items">

        <div class="item-adv">
            <img src="https://ark-unity.com/images/icons/CementPaste_Icon.webp">
            <div class="info">
                <h3>Alpha Mount</h3>
                <p>Rare Dino</p>
            </div>
            <div class="price">50K ADV</div>
        </div>

    </div>
</div>

</section>

<script>
function toggle(el){
    const category = el.parentElement;
    const arrow = el.querySelector(".arrow");

    category.classList.toggle("open");

    if(category.classList.contains("open")){
        arrow.innerText = "▲";
    } else {
        arrow.innerText = "▼";
    }
}
</script>

</body>
</html>
