<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOMNIA MARKET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.85);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:9999;
}

nav .logoSmall{
    font-weight:bold;
    letter-spacing:3px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

/* HERO */
.hero{
    height:100vh;
    background:url('banner.jpg') center center;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-shadow:0 0 20px black;
    padding-top:80px;
}

.logo{
    font-size:100px;
    letter-spacing:10px;
    animation: glow 2s infinite alternate, float 4s infinite ease-in-out;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff, 0 0 20px #ff00ff;
    }
    to{
        text-shadow:0 0 20px #fff, 0 0 40px #ff00ff;
    }
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(10px);}
}

/* SHOP */
.shop{
    padding:80px 10%;
}

/* CATEGORY BUTTON */
.category{
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.02);
}

.category-header{
    padding:15px 20px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:20px;
    transition:0.3s;
}

.category-header:hover{
    background:rgba(255,0,255,0.1);
}

/* ARROW */
.arrow{
    transition:0.3s;
}

/* ITEMS (ukryte domyślnie) */
.items{
    display:none;
    padding:10px 20px 20px 20px;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    padding:15px;
    margin-top:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
}

.item:hover{
    background:rgba(255,0,255,0.08);
}

.price{
    color:#ff00ff;
    font-weight:bold;
}
</style>
</head>

<body>

<nav>
    <div class="logoSmall">INSOMNIA</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#shop">Shop</a></li>
    </ul>
</nav>

<section class="hero">
    <h1 class="logo">INSOMNIA</h1>
    <h3>ARK: Survival Ascended</h3>
</section>

<section class="shop" id="shop">

<!-- VIP -->
<div class="category">
    <div class="category-header" onclick="toggle(this)">
        VIP <span class="arrow">▼</span>
    </div>
    <div class="items">

        <div class="item">
            <div>VIP Kit</div>
            <div class="price">25 PLN</div>
        </div>

        <div class="item">
            <div>Elite Pack</div>
            <div class="price">40 PLN</div>
        </div>

    </div>
</div>

<!-- DINOS -->
<div class="category">
    <div class="category-header" onclick="toggle(this)">
        DINOS <span class="arrow">▼</span>
    </div>
    <div class="items">

        <div class="item">
            <div>Alpha Mount</div>
            <div class="price">50 PLN</div>
        </div>

        <div class="item">
            <div>Rex Boss</div>
            <div class="price">70 PLN</div>
        </div>

    </div>
</div>

<!-- KITS -->
<div class="category">
    <div class="category-header" onclick="toggle(this)">
        KITS <span class="arrow">▼</span>
    </div>
    <div class="items">

        <div class="item">
            <div>Starter Kit</div>
            <div class="price">10 PLN</div>
        </div>

    </div>
</div>

</section>

<script>
function toggle(el){
    const items = el.nextElementSibling;
    const arrow = el.querySelector(".arrow");

    if(items.style.display === "block"){
        items.style.display = "none";
        arrow.innerText = "▼";
    } else {
        items.style.display = "block";
        arrow.innerText = "▲";
    }
}
</script>

</body>
</html>
